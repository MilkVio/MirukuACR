name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.5.2.2"
        required: true
        default: "1.0.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: MilkVio\MilkVio.csproj
  GLOBAL_VERSION_PATH: MilkVio\GlobalVersion.cs
  ASSEMBLY_NAME: MilkVio.ACR
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

  # ---------- 作者请在这里维护以下信息 ----------
  ACR_AUTHOR: "MilkVio"
  ACR_DESCRIPTION: "这是一个官方临时的高难 ACR 包，学者、占星术士与贤者由 RyougiS 制作。因目前维护时间有限，暂时合并为一个整合包；待社区 ACR 生态发展成熟后，将逐步由优秀的社区 ACR 替换。"
  ACR_API_VERSION: "15"

  # 项目仓库地址，留空时不会写入 repo.json
  ACR_SOURCE_REPOSITORY_URL: "https://github.com/MilkVio/MirukuACR"

  # 赞助地址，留空时不会写入 repo.json
  ACR_SPONSOR_URL: "https://afdian.com/a/PromeRotation"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- 解析版本 ----------
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          # 优先使用手动触发输入的版本，否则从 tag 解析
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          }

          $parsedVersion = $null
          if (-not [System.Version]::TryParse($version, [ref]$parsedVersion)) {
            throw "Version '$version' is not a valid System.Version value."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      # ---------- 安装 .NET 10 ----------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ---------- NuGet 恢复 ----------
      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH

      # ---------- 读取 referencePromeVersion ----------
      # 从本次恢复的 NuGet 缓存中定位 PromeRotation.dll，读取其程序集版本
      - name: Read reference PromeVersion
        id: references
        shell: pwsh
        run: |
          $assetsPath = "${{ github.workspace }}\MilkVio\obj\project.assets.json"
          if (-not (Test-Path $assetsPath)) {
            throw "project.assets.json not found at $assetsPath"
          }

          $assets = Get-Content $assetsPath -Raw | ConvertFrom-Json

          # 从 project.assets.json 读取实际解析到的 PromeRotation.SDK.API15 包名和包目录
          $sdkKey = ($assets.libraries | Get-Member -MemberType NoteProperty).Name |
            Where-Object { $_ -like "PromeRotation.SDK.API15/*" } |
            Select-Object -First 1

          if (-not $sdkKey) {
            throw "PromeRotation.SDK.API15 not found in project.assets.json"
          }

          # project.assets.json 里的 path 字段是相对于 NuGet 包缓存根目录的相对路径
          $pkgRelative = $assets.libraries.$sdkKey.path
          $pkgFolder = Join-Path $env:NUGET_PACKAGES $pkgRelative

          $promeDll = Join-Path $pkgFolder "ref\net10.0-windows7.0\PromeRotation.dll"
          if (-not (Test-Path $promeDll)) {
            throw "PromeRotation.dll not found at $promeDll"
          }

          $promeVersion = [System.Reflection.AssemblyName]::GetAssemblyName($promeDll).Version.ToString()
          Write-Host "referencePromeVersion = $promeVersion"
          "prome_version=$promeVersion" >> $env:GITHUB_OUTPUT

      # ---------- 同步 GlobalVersion.cs 中的版本号 ----------
      - name: Sync GlobalVersion
        shell: pwsh
        run: |
          $path = "${{ github.workspace }}\${{ env.GLOBAL_VERSION_PATH }}"
          $version = "${{ steps.version.outputs.version }}"
          $text = Get-Content -Path $path -Raw

          # 匹配 public const string Version = "..."
          $pattern = '(public const string Version\s*=\s*")[^"]+(")'
          $regex = [regex]::new($pattern)
          $match = $regex.Match($text)

          if (-not $match.Success) {
            throw "Could not find version constant in $path."
          }

          $updated = $regex.Replace($text, '${1}' + $version + '${2}', 1)

          if ($updated -eq $text) {
            Write-Host "GlobalVersion.cs is already set to $version; no change required."
          }
          else {
            $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
            [System.IO.File]::WriteAllText($path, $updated, $utf8NoBom)
            Write-Host "GlobalVersion.cs version updated to $version"
          }

      # ---------- 编译 ----------
      - name: Build
        shell: pwsh
        run: |
          $publishDir = "${{ runner.temp }}\publish"
          dotnet build $env:PROJECT_PATH `
            --configuration Release `
            --no-restore `
            -p:OutputPath="$publishDir" `
            -p:AppendTargetFrameworkToOutputPath=false `
            -p:AppendRuntimeIdentifierToOutputPath=false

          # 验证产物
          $dllPath = Join-Path $publishDir "${{ env.ASSEMBLY_NAME }}.dll"
          if (-not (Test-Path $dllPath)) {
            throw "Build output not found: $dllPath"
          }

          Write-Host "ACR DLL: $dllPath"

      # ---------- 打包 latest.zip ----------
      - name: Package zip
        shell: pwsh
        run: |
          $publishDir = "${{ runner.temp }}\publish"
          $distDir = "${{ runner.temp }}\dist"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          $dll = Join-Path $publishDir "${{ env.ASSEMBLY_NAME }}.dll"
          $depsJson = Join-Path $publishDir "${{ env.ASSEMBLY_NAME }}.deps.json"

          $toPack = @()
          if (Test-Path $dll) {
            $toPack += $dll
          }
          else {
            throw "Missing: $dll"
          }

          if (Test-Path $depsJson) {
            $toPack += $depsJson
          }
          else {
            Write-Host "Warning: deps.json not found, skipping."
          }

          $zipPath = Join-Path $distDir "latest.zip"
          Compress-Archive -Path $toPack -DestinationPath $zipPath -Force
          Write-Host "ZIP created: $zipPath"

      # ---------- 生成 repo.json ----------
      - name: Generate repo json
        shell: pwsh
        run: |
          $distDir = "${{ runner.temp }}\dist"
          $zipPath = Join-Path $distDir "latest.zip"
          $repoPath = Join-Path $distDir "repo.json"

          # 计算 SHA256
          $sha256 = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          Write-Host "SHA256: $sha256"

          # ACR 下载地址始终使用当前仓库的 latest Release
          $downloadUrl = "${{ github.server_url }}/${{ github.repository }}/releases/latest/download/latest.zip"

          # 构建必填字段
          $manifest = [ordered]@{
            author                = "${{ env.ACR_AUTHOR }}"
            version               = "${{ steps.version.outputs.version }}"
            description           = "${{ env.ACR_DESCRIPTION }}"
            supportedJobs         = @(
              # Tank
              [ordered]@{ job = "PLD"; contentScope = "HighEnd" }
              [ordered]@{ job = "WAR"; contentScope = "HighEnd" }
              [ordered]@{ job = "DRK"; contentScope = "HighEnd" }

              # Healer
              [ordered]@{ job = "WHM"; contentScope = "HighEnd" }
              [ordered]@{ job = "SCH"; contentScope = "HighEnd" }
              [ordered]@{ job = "AST"; contentScope = "HighEnd" }
              [ordered]@{ job = "SGE"; contentScope = "HighEnd" }

              # Melee DPS
              [ordered]@{ job = "MNK"; contentScope = "HighEnd" }
              [ordered]@{ job = "DRG"; contentScope = "HighEnd" }
              [ordered]@{ job = "NIN"; contentScope = "HighEnd" }
              [ordered]@{ job = "SAM"; contentScope = "HighEnd" }
              [ordered]@{ job = "VPR"; contentScope = "HighEnd" }

              # Ranged DPS
              [ordered]@{ job = "MCH"; contentScope = "HighEnd" }
              [ordered]@{ job = "DNC"; contentScope = "HighEnd" }

              # Caster DPS
              [ordered]@{ job = "SMN"; contentScope = "HighEnd" }
              [ordered]@{ job = "RDM"; contentScope = "HighEnd" }
              [ordered]@{ job = "PCT"; contentScope = "HighEnd" }
            )
            apiVersion            = [int]"${{ env.ACR_API_VERSION }}"
            referencePromeVersion = "${{ steps.references.outputs.prome_version }}"
            downloadUrl           = $downloadUrl
            sha256                = $sha256
          }

          # 可选字段：留空时不写入 repo.json
          $sourceRepositoryUrl = "${{ env.ACR_SOURCE_REPOSITORY_URL }}".Trim()
          if (-not [string]::IsNullOrWhiteSpace($sourceRepositoryUrl)) {
            $manifest["sourceRepositoryUrl"] = $sourceRepositoryUrl
          }

          $sponsorUrl = "${{ env.ACR_SPONSOR_URL }}".Trim()
          if (-not [string]::IsNullOrWhiteSpace($sponsorUrl)) {
            $manifest["sponsorUrl"] = $sponsorUrl
          }

          $json = $manifest | ConvertTo-Json -Depth 8
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($repoPath, $json, $utf8NoBom)
          Write-Host "repo.json written to $repoPath"

      # ---------- 上传 Artifact ----------
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            ${{ runner.temp }}\dist\latest.zip
            ${{ runner.temp }}\dist\repo.json

      # ---------- 创建 GitHub Release ----------
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          files: |
            ${{ runner.temp }}\dist\latest.zip
            ${{ runner.temp }}\dist\repo.json
